<div class="space-y-4">
  <!-- Barra de herramientas -->
  <div *ngIf="showFilters" class="bg-white rounded-lg shadow p-4">
    <div class="flex flex-wrap gap-4 items-center justify-between">
      <!-- Búsqueda -->
      <div class="flex-1 min-w-50">
        <div class="relative">
          <input
            type="text"
            [(ngModel)]="searchTerm"
            (ngModelChange)="applyFilters()"
            placeholder="Buscar por cliente o ID..."
            class="input pl-10"
          />
          <i class="bi bi-search absolute left-3 top-2.5 text-gray-400"></i>
        </div>
      </div>

      <!-- Filtro por estado -->
      <select
        [(ngModel)]="statusFilter"
        (ngModelChange)="applyFilters()"
        class="input w-40"
      >
        <option value="">Todos</option>
        <option *ngFor="let status of statusOptions" [value]="status">
          {{ status }}
        </option>
      </select>

      <!-- Filtro por fecha -->
      <div class="relative">
        <select
          [(ngModel)]="dateFilter"
          (ngModelChange)="applyFilters(); showDatePicker = $event === 'custom'"
          class="input w-40"
        >
          <option value="">Todas las fechas</option>
          <option *ngFor="let opt of dateOptions" [value]="opt.value">
            {{ opt.label }}
          </option>
        </select>
      </div>

      <!-- Filtro fecha personalizado -->
      <div *ngIf="showDatePicker" class="flex gap-2">
        <input
          type="date"
          [(ngModel)]="startDate"
          (ngModelChange)="applyFilters()"
          class="input w-40"
        />
        <span class="self-center">-</span>
        <input
          type="date"
          [(ngModel)]="endDate"
          (ngModelChange)="applyFilters()"
          class="input w-40"
        />
      </div>

      <!-- Botones -->
      <div class="flex gap-2">
        <button
          (click)="resetFilters()"
          class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg flex items-center gap-2"
        >
          <i class="bi bi-broom"></i>
          Limpiar
        </button>

        <div *ngIf="selectedOrders.size > 0" class="flex gap-2">
          <button
            (click)="approveSelected()"
            class="btn-success text-sm px-3 py-2 flex items-center gap-1"
          >
            <i class="bi bi-check-circle"></i>
            Aprobar ({{ selectedOrders.size }})
          </button>
          <button
            (click)="rejectSelected()"
            class="btn-danger text-sm px-3 py-2 flex items-center gap-1"
          >
            <i class="bi bi-x-circle"></i>
            Rechazar ({{ selectedOrders.size }})
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TABLA -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <div *ngIf="loading" class="p-8">
      <app-loading-spinner></app-loading-spinner>
    </div>

    <div class="w-full overflow-x-auto">
      <table *ngIf="!loading" class="divide-y divide-gray-200 min-w-[1100px]">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3">
              <input
                type="checkbox"
                [(ngModel)]="selectAll"
                (ngModelChange)="toggleSelectAll()"
              />
            </th>

            <th
              *ngFor="let col of columns"
              (click)="sort(col.key)"
              class="px-6 py-3 cursor-pointer hover:bg-gray-100"
            >
              <span class="flex items-center gap-1">
                {{ col.label }}
                <i [class]="getSortIcon(col.key)" class="text-gray-400"></i>
              </span>
            </th>

            <th class="px-6 py-3 text-right">Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let order of paginatedOrders">
            <td class="px-6 py-4">
              <ng-container *ngIf="order.status === 'PENDING'">
                <input 
                  type="checkbox"
                  [checked]="isSelected(order.id)"
                  (change)="toggleSelect(order.id)">
              </ng-container>
            </td>

            <td *ngFor="let col of columns" class="px-6 py-4">
              <ng-container [ngSwitch]="col.key">
                <span *ngSwitchCase="'status'">
                  <app-status-badge [status]="order.status"></app-status-badge>
                </span>

                <span *ngSwitchCase="'createdAt'">
                  {{ formatDate(order.createdAt) }}
                </span>

                <span *ngSwitchDefault>
                  {{ order[col.key] }}
                </span>
              </ng-container>
            </td>

            <!-- acciones -->
            <td class="px-6 py-4 text-right space-x-2">
              <button (click)="viewOrder(order.id)" class="text-blue-600">
                <i class="bi bi-eye"></i>
              </button>

              <button
                *ngIf="order.status === 'PENDING'"
                (click)="approveOrder(order.id)"
                class="text-green-600"
              >
                <i class="bi bi-check-circle"></i>
              </button>

              <button
                *ngIf="order.status === 'PENDING'"
                (click)="rejectOrder(order.id)"
                class="text-red-600"
              >
                <i class="bi bi-x-circle"></i>
              </button>
            </td>
          </tr>

          <!-- vacío -->
          <tr *ngIf="paginatedOrders.length === 0">
            <td colspan="10" class="text-center py-10 text-gray-500">
              <i class="bi bi-inbox text-4xl mb-2 block"></i>
              No se encontraron órdenes
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Paginación -->
    <div *ngIf="totalPages > 1" class="p-4 flex justify-between">
      <button
        (click)="changePage(currentPage - 1)"
        [disabled]="currentPage === 1"
      >
        <i class="bi bi-arrow-left"></i> Anterior
      </button>

      <button
        (click)="changePage(currentPage + 1)"
        [disabled]="currentPage === totalPages"
      >
        Siguiente <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  </div>
</div>
