<div class="min-h-screen bg-gray-50">
  <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between h-20">
        
        <div class="flex items-center gap-2">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
            <i class="bi bi-currency-bitcoin text-white text-xl"></i>
          </div>
          <h2 class="text-xl font-black text-slate-800 tracking-tighter italic">
            CRYPTO<span class="text-blue-600">MONITOR</span>
          </h2>
        </div>

        <div class="flex items-center space-x-6">
          <div class="flex flex-col items-end  sm:flex">
            <span class="text-xs font-black text-gray-400 uppercase tracking-widest">Bienvenido</span>
            <span class="text-sm font-bold text-slate-700">{{ fullname }}</span>
          </div>
          
          <div class="h-10 w-px bg-gray-100 mx-2"></div>

          <button 
            (click)="logout()" 
            title="Cerrar Sesión"
            class="group flex items-center justify-center w-12 h-12 rounded-2xl bg-rose-50 hover:bg-rose-500 text-rose-500 hover:text-white transition-all duration-300 shadow-sm hover:shadow-rose-200 active:scale-90"
          >
            <i class="bi bi-door-open-fill text-xl group-hover:hidden"></i>
            <i class="bi bi-box-arrow-right text-xl hidden group-hover:block animate-in fade-in zoom-in duration-300"></i>
          </button>
        </div>

      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <router-outlet></router-outlet>
  </main>
</div>
