<div class="min-h-screen bg-slate-50">
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-[1600px] mx-auto px-6">
      <div class="flex justify-between h-16">
        
         <div class="flex items-center gap-2">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
            <i class="bi bi-currency-bitcoin text-white text-xl"></i>
          </div>
          <h2 class="text-xl font-black text-slate-800 tracking-tighter italic">
            CRYPTO<span class="text-blue-600">MONITOR</span>
          </h2>
           <span class="ml-2 px-2 py-0.5 bg-slate-100 text-slate-500 text-[10px] font-bold rounded border uppercase tracking-widest">
            Admin Mode
          </span>
        </div>

        <div class="flex items-center space-x-4">
          <div class="text-right hidden sm:block">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Administrador</p>
            <p class="text-sm font-bold text-slate-700">{{ fullname }}</p>
          </div>
          
          <div class="h-8 w-px bg-slate-100 mx-2"></div>

          <button 
            (click)="logout()" 
            title="Cerrar Sesión"
            class="group flex items-center justify-center w-10 h-10 rounded-xl bg-slate-50 hover:bg-rose-600 text-slate-400 hover:text-white transition-all duration-300 shadow-sm active:scale-90"
          >
            <i class="bi bi-door-closed group-hover:hidden text-lg"></i>
            <i class="bi bi-box-arrow-right hidden group-hover:block text-lg animate-in fade-in zoom-in duration-200"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-[1600px] mx-auto px-6 py-8">
    <div class="flex flex-col lg:flex-row gap-8">
      
      <aside class="w-full lg:w-72 shrink-0">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sticky top-24">
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 px-4">Navegación</p>
          
          <nav class="space-y-1">
            <a routerLink="/admin/dashboard" routerLinkActive="bg-indigo-50 text-indigo-700 shadow-sm border-indigo-100" 
               class="px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-600 font-bold transition-all flex items-center gap-3 border border-transparent">
              <i class="bi bi-grid-1x2-fill text-lg"></i>
              <span class="text-sm">Dashboard Global</span>
            </a>

            <a routerLink="/admin/orders" routerLinkActive="bg-indigo-50 text-indigo-700 shadow-sm border-indigo-100"
               class="px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-600 font-bold transition-all flex items-center gap-3 border border-transparent">
              <i class="bi bi-stack text-lg"></i>
              <span class="text-sm">Gestión de Órdenes</span>
            </a>

            <a routerLink="/admin/users" routerLinkActive="bg-indigo-50 text-indigo-700 shadow-sm border-indigo-100"
               class="px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-600 font-bold transition-all flex items-center gap-3 border border-transparent">
              <i class="bi bi-people-fill text-lg"></i>
              <span class="text-sm">Base de Usuarios</span>
            </a>

            <div class="my-4 border-t border-slate-50 mx-4"></div>

            <a routerLink="/admin/features" routerLinkActive="bg-indigo-50 text-indigo-700 shadow-sm border-indigo-100"
               class="px-4 py-3 rounded-xl hover:bg-slate-50 text-slate-600 font-bold transition-all flex items-center gap-3 border border-transparent">
              <i class="bi bi-sliders text-lg"></i>
              <span class="text-sm">Control de Compras</span>
            </a>
          </nav>

          <div class="mt-8 p-4 bg-slate-900 rounded-xl">
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Sistema Loggeado</p>
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
              <span class="text-xs text-white font-medium">Servidor Activo</span>
            </div>
          </div>
        </div>
      </aside>

      <main class="flex-1">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 min-h-[calc(100vh-180px)] p-8">
          <router-outlet></router-outlet>
        </div>
      </main>

    </div>
  </div>
</div>
