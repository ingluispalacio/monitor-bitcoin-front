<div *ngIf="isOpen" class="fixed inset-0 z-50 overflow-y-auto" (keydown.escape)="onCancel()">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black bg-opacity-50 transition-opacity" (click)="onCancel()"></div>
  
  <!-- Modal centrado -->
  <div class="flex min-h-full items-center justify-center p-4">
    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-md transform transition-all">
      
      <!-- Header más compacto -->
      <div class="flex items-center justify-between px-5 py-3 border-b bg-gray-50 rounded-t-xl">
        <div class="flex items-center gap-2">
          <i class="bi" [class.bi-person-plus-fill]="!data.user" [class.bi-pencil-fill]="data.user" 
             [class.text-blue-600]="!data.user" [class.text-green-600]="data.user"></i>
          <h3 class="text-lg font-semibold text-gray-800">
            {{ data.user ? 'Editar Usuario' : 'Nuevo Usuario' }}
          </h3>
        </div>
        <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <i class="bi bi-x-lg text-xl"></i>
        </button>
      </div>

      <!-- Formulario en grid de 2 columnas -->
      <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-5">
        <div class="grid grid-cols-2 gap-3">
          
          <!-- Nombre -->
          <div class="col-span-1">
            <label class="block text-xs font-medium text-gray-600 mb-1">Nombre</label>
            <input type="text" formControlName="name" 
              class="w-full px-3 py-1.5 text-sm border rounded-lg focus:ring-1 focus:ring-blue-500"
              [class.border-red-500]="name?.invalid && name?.touched"
              placeholder="Nombre">
            <div *ngIf="name?.invalid && name?.touched" class="text-xs text-red-600 mt-0.5">
              Requerido
            </div>
          </div>

          <!-- Apellido -->
          <div class="col-span-1">
            <label class="block text-xs font-medium text-gray-600 mb-1">Apellido</label>
            <input type="text" formControlName="lastname" 
              class="w-full px-3 py-1.5 text-sm border rounded-lg focus:ring-1 focus:ring-blue-500"
              [class.border-red-500]="lastname?.invalid && lastname?.touched"
              placeholder="Apellido">
            <div *ngIf="lastname?.invalid && lastname?.touched" class="text-xs text-red-600 mt-0.5">
              Requerido
            </div>
          </div>

          <!-- Email (ocupa 2 columnas) -->
          <div class="col-span-2">
            <label class="block text-xs font-medium text-gray-600 mb-1">Email</label>
            <input type="email" formControlName="email" 
              class="w-full px-3 py-1.5 text-sm border rounded-lg focus:ring-1 focus:ring-blue-500"
              [class.border-red-500]="email?.invalid && email?.touched"
              placeholder="correo@ejemplo.com">
            <div *ngIf="email?.invalid && email?.touched" class="text-xs text-red-600 mt-0.5">
              <span *ngIf="email?.errors?.['required']">Requerido</span>
              <span *ngIf="email?.errors?.['email']">Email inválido</span>
            </div>
          </div>

          <!-- Username -->
          <div class="col-span-2">
            <label class="block text-xs font-medium text-gray-600 mb-1">Usuario</label>
            <input type="text" formControlName="username" 
              class="w-full px-3 py-1.5 text-sm border rounded-lg focus:ring-1 focus:ring-blue-500"
              [class.border-red-500]="username?.invalid && username?.touched"
              placeholder="nombre_usuario">
            <div *ngIf="username?.invalid && username?.touched" class="text-xs text-red-600 mt-0.5">
              Requerido
            </div>
          </div>

          <!-- Contraseña (solo nuevos usuarios) -->
          <div *ngIf="!data.user" class="col-span-2">
            <label class="block text-xs font-medium text-gray-600 mb-1">Contraseña</label>
            <input type="password" formControlName="password" 
              class="w-full px-3 py-1.5 text-sm border rounded-lg focus:ring-1 focus:ring-blue-500"
              [class.border-red-500]="password?.invalid && password?.touched"
              placeholder="••••••••">
            <div *ngIf="password?.invalid && password?.touched" class="text-xs text-red-600 mt-0.5">
              <span *ngIf="password?.errors?.['required']">Requerida</span>
              <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres</span>
            </div>
          </div>

          <!-- Fila de Rol y Activo -->
          <div class="col-span-2 grid grid-cols-2 gap-3">
            <!-- Rol -->
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Rol</label>
              <select formControlName="role" 
                class="w-full px-3 py-1.5 text-sm border rounded-lg focus:ring-1 focus:ring-blue-500 bg-white">
                <option [value]="UserRole.ADMIN">Administrador</option>
                <option [value]="UserRole.CLIENT">Cliente</option>
              </select>
            </div>

            <!-- Activo -->
            <div class="flex items-end pb-1.5">
              <label class="flex items-center gap-2 text-sm text-gray-700">
                <input type="checkbox" formControlName="isActive" 
                  class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                Usuario Activo
              </label>
            </div>
          </div>
        </div>

        <!-- Botones de acción más compactos -->
        <div class="flex justify-end gap-2 mt-5 pt-3 border-t">
          <button type="button" (click)="onCancel()"
            class="px-4 py-1.5 text-sm text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
            Cancelar
          </button>
          <button type="submit" [disabled]="userForm.invalid"
            class="px-4 py-1.5 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors disabled:opacity-50 flex items-center gap-1">
            <i class="bi bi-check-lg"></i>
            {{ data.user ? 'Actualizar' : 'Crear' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
